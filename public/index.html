<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>

  <meta content="CARLTECH" property="og:title"/>
  <meta content="https://files.catbox.moe/hptv7o.jpg" property="og:image"/>

  <!-- Added Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      0% { opacity: 0; transform: translateX(-100%); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      0% { opacity: 0; transform: translateX(100%); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      0% { opacity: 0; transform: translateY(100%); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .animate-bounce { animation: bounce 2s infinite; }
    .animate-spin { animation: spin 1.5s linear infinite; }
    .animate-fadeIn { animation: fadeIn 1s ease forwards; }
    .animate-slideInLeft { animation: slideInLeft 0.8s ease forwards; }
    .animate-slideInRight { animation: slideInRight 0.8s ease forwards; }
    .animate-slideInUp { animation: slideInUp 0.8s ease forwards; }

    /* Dark mode styles */
    body.dark-mode {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e0f2fe;
    }
    body.dark-mode .payment-container {
      background-color: rgba(15, 23, 42, 0.8);
      box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.5), 0 4px 6px -2px rgba(2, 132, 199, 0.4);
    }
    body.dark-mode input {
      background-color: rgba(255 255 255 / 0.1);
      border-color: rgba(255 255 255 / 0.3);
      color: #e0f2fe;
    }
    body.dark-mode input::placeholder {
      color: rgba(224, 242, 254, 0.6);
    }
    body.dark-mode .dark-mode-toggle {
      background-color: #1e293b;
      color: #38bdf8;
    }

    /* Windows dots loading animation */
    .windows-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .windows-loader span {
      width: 14px;
      height: 14px;
      background-color: #14b8a6;
      border-radius: 50%;
      opacity: 0.3;
      animation-name: windowsBounce;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-duration: 1.2s;
    }
    .windows-loader span:nth-child(1) { animation-delay: 0s; }
    .windows-loader span:nth-child(2) { animation-delay: 0.15s; }
    .windows-loader span:nth-child(3) { animation-delay: 0.3s; }
    .windows-loader span:nth-child(4) { animation-delay: 0.45s; }

    @keyframes windowsBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-15px); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-800 text-white min-h-screen flex flex-col items-center justify-center px-4 sm:px-6 lg:px-8">
  <button aria-label="Toggle dark mode" class="dark-mode-toggle absolute top-5 right-5 bg-blue-700 text-white p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-cyan-400" onclick="toggleDarkMode()">
    🌒
  </button>
  <div class="logo-container my-8 animate-slideInLeft flex justify-center">
    <img alt="A circular logo with a gradient border from teal to cyan, featuring a stylized letter C in the center on a dark background" class="w-48 h-48 rounded-full border-4 border-teal-500" height="192" src="https://storage.googleapis.com/a1aa/image/280804a3-6bcc-40ac-8b58-0c21cccf4d44.jpg" width="192"/>
  </div>
  <h3 class="text-3xl font-bold mb-4 animate-bounce text-center">
    Stripe API Project
  </h3>
  <div class="payment-container bg-white bg-opacity-10 p-8 rounded-2xl shadow-lg max-w-md w-full animate-fadeIn">
    <h3 class="text-xl font-semibold mb-4 text-center animate-slideInRight">
      Securely pay to our services
    </h3>
    <p class="text-center mb-6 animate-slideInUp">
      Enter your Phone Number and Amount to make Payment Securely and Conveniently at no Costs.
    </p>
    <form class="space-y-4" id="paymentForm">
      <div>
        <label class="block mb-2" for="phone">Your Phone Number</label>
        <input aria-label="Phone Number" autocomplete="tel" class="w-full p-3 rounded-md bg-white bg-opacity-20 border border-white border-opacity-20 text-white placeholder-white placeholder-opacity-70 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent" id="phone" inputmode="tel" pattern="07[0-9]{8}" placeholder="Eg 07XXXXXXXX" required title="Phone number should start with 07 and be 10 digits long" type="tel"/>
      </div>
      <div>
        <label class="block mb-2" for="amount">Amount you wish to pay</label>
        <input aria-label="Payment Amount" class="w-full p-3 rounded-md bg-white bg-opacity-20 border border-white border-opacity-20 text-white placeholder-white placeholder-opacity-70 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent" id="amount" min="1" placeholder="Amt 1, 10, 100, 200" required step="1" type="number"/>
      </div>
      <button aria-label="Make Payment" class="w-full py-3 bg-gradient-to-r from-teal-500 to-cyan-500 rounded-md font-bold text-white shadow-md hover:from-cyan-500 hover:to-teal-500 transition-all focus:outline-none focus:ring-4 focus:ring-cyan-400" id="payBtn" type="submit">
        Make Payment
      </button>
    </form>
  </div>
  <footer class="mt-8 text-center text-sm sm:text-base">

      ©2025 Sponsored By

      </a>
    </p>
  </footer>
  <div aria-hidden="true" aria-live="assertive" class="loader-overlay fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden" id="loader" role="alert">
    <div class="text-center">
      <div aria-label="Loading animation with four bouncing teal dots" class="windows-loader" role="img">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loader-text mt-4 text-white text-lg">
        Please enter mpesa pin...
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script>
    // Initialize Supabase client
    const supabaseUrl = 'https://rgondsvnduqcodofshis.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnb25kc3ZuZHVxY29kb2ZzaGlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4MDQ1OTEsImV4cCI6MjA2OTM4MDU5MX0.TaOO7em2LY4Y6b9IVye6TuSLoKWhVTVw3XbjUAkL020';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Dark mode toggle functionality
    function toggleDarkMode() {
      const body = document.body;
      body.classList.toggle('dark-mode');
      const darkModeToggle = document.querySelector('.dark-mode-toggle');
      darkModeToggle.textContent = body.classList.contains('dark-mode') ? '🌝' : '🌒';
    }

    // Payment form handling
    document.getElementById('paymentForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      
      const phoneInput = document.getElementById('phone');
      const amountInput = document.getElementById('amount');
      const phone = phoneInput.value.trim();
      const amount = amountInput.value.trim();
      const loader = document.getElementById('loader');

      // Basic validation
      const phonePattern = /^07\d{8}$/;
      if (!phonePattern.test(phone)) {
        Swal.fire('Error', 'Please enter a valid phone number starting with 07 and 10 digits long.', 'error');
        phoneInput.focus();
        return;
      }
      if (!amount || isNaN(amount) || Number(amount) < 1) {
        Swal.fire('Error', 'Please enter a valid amount greater than 0.', 'error');
        amountInput.focus();
        return;
      }

      // Show loader
      loader.style.display = 'flex';
      loader.setAttribute('aria-hidden', 'false');

      try {
        // 1. First log the payment to Supabase
        const { data: paymentLog, error: logError } = await supabase
          .from('payments')
          .insert([{ 
            phone: phone, 
            amount: amount, 
            status: 'pending',
            created_at: new Date().toISOString()
          }])
          .select();

        if (logError) throw logError;

        // 2. Process the payment (simulate API call)
        // Replace this with your actual payment API call
        const paymentResult = await processMpesaPayment(phone, amount);
        
        // 3. Update payment status in Supabase
        await supabase
          .from('payments')
          .update({ 
            status: paymentResult.success ? 'completed' : 'failed',
            reference: paymentResult.reference || null
          })
          .eq('id', paymentLog[0].id);

        // Hide loader
        loader.style.display = 'none';
        loader.setAttribute('aria-hidden', 'true');

        // Show result to user
        if (paymentResult.success) {
          Swal.fire({
            title: 'Payment Successful',
            html: `
              Amount: <b>Ksh ${amount}</b><br>
              Phone: <b>${phone}</b><br>
              Txn ID: <b>${paymentResult.reference}</b><br>
            `,
            icon: 'success',
            showCancelButton: true,
            confirmButtonText: 'Receipt',
            cancelButtonText: 'Close',
          }).then((result) => {
            if (result.isConfirmed) {
              window.location.href = `https://payments-web.onrender.com?id=${paymentResult.reference}`;
            }
          });
        } else {
          Swal.fire('Error', paymentResult.message || 'Payment Failed, Please Try Again', 'error');
        }
      } catch (error) {
        console.error('Payment error:', error);
        loader.style.display = 'none';
        loader.setAttribute('aria-hidden', 'true');
        Swal.fire('Error', 'An Unexpected Error Occurred. Please Try Again.', 'error');
      }
    });

    // Simulated Mpesa payment function - REPLACE WITH YOUR ACTUAL PAYMENT API CALL
    async function processMpesaPayment(phone, amount) {
      // This is just a simulation - replace with your actual API call to your backend
      return new Promise(resolve => {
        setTimeout(() => {
          // Simulate 80% success rate
          const success = Math.random() > 0.2;
          resolve({
            success: success,
            reference: success ? 'MP' + Date.now().toString().slice(-8) : null,
            message: success ? 'Payment processed successfully' : 'Payment processing failed'
          });
        }, 3000); // Simulate network delay
      });
    }
  </script>
</body>
