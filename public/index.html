<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta content="Make Payments to CARLTECH Online Conveniently At No Costs" name="description"/>
    <meta content="CARLTECH" property="og:title"/>
    <meta content="https://files.catbox.moe/hptv7o.jpg" property="og:image"/>
    <title>CARLTECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-100%);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(100%);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInUp {
            0% {
                opacity: 0;
                transform: translateY(100%);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-800 text-white min-h-screen flex flex-col items-center justify-center">
    <!-- Dark mode toggle button -->
    <button class="dark-mode-toggle absolute top-5 right-5 bg-blue-700 text-white p-2 rounded-md" onclick="toggleDarkMode()">🌒</button>
    <div class="logo-container my-8 animate-slideInLeft">
        <img alt="A circular logo with a gradient border from teal to cyan" class="w-48 h-48 rounded-full border-4 border-teal-500" height="200" src="https://storage.googleapis.com/a1aa/image/MGtoo7cg8gVwM7UlS6Enchufd2GqSAytByNq_f_6V74.jpg" width="200"/>
    </div>
    <h3 class="text-3xl font-bold mb-4 animate-bounce">Pay Happily</h3>
    <div class="payment-container bg-white bg-opacity-10 p-8 rounded-2xl shadow-lg max-w-md w-full animate-fadeIn">
        <h3 class="text-xl font-semibold mb-4 text-center animate-slideInRight">Securely pay to our services</h3>
        <p class="text-center mb-6 animate-slideInUp">Enter your Phone Number and Amount to make Payment Securely and Conveniently at no Costs.</p>
        <form class="space-y-4" id="paymentForm">
            <div>
                <label class="block mb-2" for="phone">Phone Number</label>
                <input class="w-full p-3 rounded-md bg-white bg-opacity-20 border border-white border-opacity-20 text-white" id="phone" placeholder="Eg 07XXXXXXXX" required="" type="text"/>
            </div>
            <div>
                <label class="block mb-2" for="amount">Amount</label>
                <input class="w-full p-3 rounded-md bg-white bg-opacity-20 border border-white border-opacity-20 text-white" id="amount" placeholder="Eg 1, 10, 100, 200" required="" type="number"/>
            </div>
            <button class="w-full py-3 bg-gradient-to-r from-teal-500 to-cyan-500 rounded-md font-bold text-white shadow-md hover:from-cyan-500 hover:to-teal-500 transition-all" id="payBtn" type="submit">Make Payment</button>
        </form>
    </div>
    <footer class="mt-8 text-center">
        <p>©2025 Sponsored By <a class="text-teal-500 hover:text-cyan-500" href="https://github.com/carl24tech">carl24tech</a></p>
    </footer>
    <div class="loader-overlay fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden" id="loader">
        <div class="text-center">
            <div class="loader w-20 h-20 border-8 border-t-teal-500 border-r-cyan-500 border-white border-opacity-20 rounded-full animate-spin"></div>
            <div class="loader-text mt-4 text-white text-lg">Please enter mpesa pin...</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Dark mode toggle functionality
        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const darkModeToggle = document.querySelector('.dark-mode-toggle');
            if (body.classList.contains('dark-mode')) {
                darkModeToggle.textContent = '🌒';
            } else {
                darkModeToggle.textContent = '🌝';
            }
        }

        document.getElementById('paymentForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const amount = document.getElementById('amount').value.trim();

            if (!phone || !amount) {
                Swal.fire('Error', 'Please Fill in All Fields.', 'error');
                return;
            }

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const response = await fetch('/api/pay.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, amount }),
                });

                const contentType = response.headers.get('Content-Type');
                let result;

                if (contentType && contentType.includes('application/json')) {
                    result = await response.json();
                } else {
                    result = await response.text();
                }

                loader.style.display = 'none';

                if (response.ok) {
                    Swal.fire({
                        title: 'Payment Successful',
                        html: `
                            Amount: <b>Ksh ${result.data.amount}</b><br>
                            Phone: <b>${result.data.phone}</b><br>
                            Txn ID: <b>${result.data.refference}</b><br>
                        `,
                        icon: 'success',
                        showCancelButton: true,
                        confirmButtonText: 'Receipt',
                        cancelButtonText: 'Cancel',
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = `https://paymenttech-6ec830ffcd8e.herokuapp.com?id=${result.data.refference}`;
                        }
                    });
                } else {
                    Swal.fire('Error', result.message || 'Payment Failed, Please Try Again', 'error');
                }
            } catch (error) {
                loader.style.display = 'none';
                Swal.fire('Error', 'An Unexpected Error Occurred. Please Try Again.', 'error');
            }
        });
    </script>
</body>
</html>
