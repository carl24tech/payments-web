<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Make Payments to BWM-XMD Online Conveniently And At No Costs">
    <meta property="og:title" content="BWM-XMD | M-PESA Checkout">
    <meta property="og:image" content="https://bwm-xmd-files.vercel.app/bwmxmd_s1n829.webp">
    <title>Carltech Mpesa Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
        }
        .fade-in {
            animation: fadeIn 4s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .slide-in {
            animation: slideIn 2s ease-in-out;
        }
        @keyframes slideIn {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        .progress-bar {
            width: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff007f, #7f00ff);
            animation: progress 3s infinite;
        }
        @keyframes progress {
            0% {
                width: 0;
            }
            100% {
                width: 100%;
            }
        }
        .multicolor-button {
            background: linear-gradient(360deg, #ff007f, #7f00ff, #00ff7f, #007fff);
            background-size: 400% 400%;
            animation: gradient 5s ease infinite;
        }
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex flex-col items-center justify-center transition-colors duration-300">
    <button class="dark-mode-toggle absolute top-5 right-5 bg-white bg-opacity-10 text-white py-2 px-4 rounded-md cursor-pointer transition-colors duration-300 hover:bg-opacity-20" onclick="toggleDarkMode()" aria-label="Toggle dark mode">🌒</button>

    <header class="logo-container my-8 fade-in">
        <img src="https://bwm-xmd-files.vercel.app/bwmxmd_s1n829.webp" alt="BWM-XMD Logo" class="w-48 h-48 rounded-full border-4 border-pink-500 pulse">
    </header>

    <main class="payment-container bg-white bg-opacity-10 p-8 rounded-2xl shadow-lg max-w-md w-full mx-auto transition-colors duration-300 slide-in">
        <h3 class="text-center text-2xl mb-4">Carltech Nexus Services</h3>
        <p class="text-center mb-8">Enter your phone number and amount to make a payment securely and conveniently at no cost.</p>
        <form id="paymentForm" class="space-y-4">
            <div>
                <label for="phone" class="block mb-2">Phone Number</label>
                <input type="text" id="phone" placeholder="Eg 07******" required class="w-full p-3 rounded-md bg-white bg-opacity-10 border border-white border-opacity-20 text-white transition-colors duration-300">
            </div>
            <div>
                <label for="amount" class="block mb-2">Amount</label>
                <input type="number" id="amount" placeholder="Eg 10, 100, 1000, 2000" required class="w-full p-3 rounded-md bg-white bg-opacity-10 border border-white border-opacity-20 text-white transition-colors duration-300">
            </div>
            <button type="submit" id="payBtn" class="w-full py-3 rounded-md font-bold text-white shadow-md transition-colors duration-300 multicolor-button">Make Payments</button>
        </form>
    </main>

    <footer class="mt-8 text-center font-bold fade-in">
        <p>mpesagateway©2025 Secured By <a href="https://github.com/carl24tech" class="text-pink-500 hover:text-purple-500 transition-colors duration-300">Carl William</a></p>
    </footer>

    <div class="loader-overlay fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden" id="loader">
        <div class="w-3/4">
            <div class="progress-bar"></div>
            <div class="loader-text mt-4 text-center text-white text-lg">Please enter M-PESA PIN...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script>
        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const darkModeToggle = document.querySelector('.dark-mode-toggle');
            darkModeToggle.textContent = body.classList.contains('dark-mode') ? 'D' : 'L';
        }

        document.getElementById('paymentForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const amount = document.getElementById('amount').value.trim();

            if (!phone || !amount) {
                Swal.fire('Error', 'Please Fill in All Fields.', 'error');
                return;
            }

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const response = await fetch('/api/pay.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, amount }),
                });

                const contentType = response.headers.get('Content-Type');
                let result;

                if (contentType && contentType.includes('application/json')) {
                    result = await response.json();
                } else {
                    result = await response.text();
                }

                loader.style.display = 'none';

                if (response.ok) {
                    Swal.fire({
                        title: 'Payment Successful',
                        html: `
                            Amount: <b>Ksh ${result.data.amount}</b><br>
                            Phone: <b>${result.data.phone}</b><br>
                            Txn ID: <b>${result.data.reference}</b><br>
                        `,
                        icon: 'success',
                        showCancelButton: true,
                        confirmButtonText: 'Receipt',
                        cancelButtonText: 'Cancel',
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = `https://paymenttech-6ec830ffcd8e.herokuapp.com?id=${result.data.reference}`;
                        }
                    });
                } else {
                    Swal.fire('Error', result.message || 'Payment Failed, Please Try Again', 'error');
                }
            } catch (error) {
                loader.style.display = 'none';
                Swal.fire('Error', 'An Unexpected Error Occurred. Please Try Again.', 'error');
            }
        });
    </script>
</body>
</html>
